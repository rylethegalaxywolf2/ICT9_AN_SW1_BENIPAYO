<!DOCTYPE html>
<html>
<head>
    <title>Q4 Seatwork 1</title>

    <style>
        body {
            background-color: black;
            color: lime;
            font-family: Arial;
        }

        .login-box {
            margin: 100px auto;
            width: 300px;
            padding: 30px;
            border: 2px solid lime;
            border-radius: 15px;
            background-color: #111;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid lime;
            border-radius: 8px;
            background-color: black;
            color: lime;
        }

        button {
            width: 95%;
            padding: 10px;
            background-color: lime;
            color: black;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        #message {
            margin-top: 15px;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <h1>Login</h1>
        <p>Enter your username and password</p>

        <input type="text" id="username" placeholder="Username"><br>
        <input type="password" id="password" placeholder="Password"><br>

        <button onclick="loginUser()">Login</button>

        <p id="message"></p>
    </div>

    <script>
        var CorrectUser = "Emerald";
        var CorrectPass = "12345";
        var attempt = 0;
        var MaxTry = 3;

        function loginUser() {
            var username = document.getElementById("username").value;
            var password = document.getElementById("password").value;

            if (attempt < MaxTry) {
                if (username === CorrectUser && password === CorrectPass) {
                    document.getElementById("message").innerHTML = "Login Successful";
                } else {
                    attempt++;
                    document.getElementById("message").innerHTML =
                        "Login Failed. Attempts left: " + (MaxTry - attempt);
                }
            } else {
                document.getElementById("message").innerHTML = "Account Locked";
            }
        }
    </script>

</body>
</html>
